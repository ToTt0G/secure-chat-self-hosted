version: "3.8"

services:
  app:
    image: ghcr.io/tott0g/secure-chat-self-hosted-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000" # Web App
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      # Socket server URL - Empty to use same origin (proxied by Next.js)
      - NEXT_PUBLIC_SOCKET_URL=
    depends_on:
      - redis
    networks:
      - app_network

  socket-server:
    image: ghcr.io/tott0g/secure-chat-self-hosted-socket:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3001:3001" # WebSocket server
    environment:
      - REDIS_URL=redis://redis:6379
      - SOCKET_PORT=3001
      # Dynamic CORS for previews, defaults to production domain
      - CORS_ORIGIN=${CORS_ORIGIN:-https://secure-chat.redsunsetfarm.com}
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      # Automatically appends PR number for isolated ephemeral storage, or nothing for production
      - /mnt/data/secure_chat_redis${COOLIFY_PULL_REQUEST_NUMBER}:/data
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
