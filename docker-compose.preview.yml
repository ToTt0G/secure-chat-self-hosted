version: "3.8"

services:
  app:
    image: ghcr.io/tott0g/secure-chat-self-hosted-app:pr-${COOLIFY_PULL_REQUEST_NUMBER}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - NEXT_PUBLIC_SOCKET_URL=
    depends_on:
      - redis
    networks:
      - preview_network

  socket-server:
    image: ghcr.io/tott0g/secure-chat-self-hosted-socket:pr-${COOLIFY_PULL_REQUEST_NUMBER}
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - SOCKET_PORT=3001
      - CORS_ORIGIN=*
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - preview_network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - secure_chat_preview_redis_${COOLIFY_PULL_REQUEST_NUMBER}:/data
    networks:
      - preview_network

volumes:
  secure_chat_preview_redis_${COOLIFY_PULL_REQUEST_NUMBER}:
    driver: local

networks:
  preview_network:
    driver: bridge
